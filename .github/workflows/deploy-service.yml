name: Deploy Application

on:
  push:
    branches: [ main ]
    paths:
      - 'infra/**'
      - '**'

  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

env:
  AWS_REGION: us-east-2
  TF_VERSION: 1.6.6
  S3_ASSETS_BUCKET: fiap-tc-terraform-functions-846874

jobs:
  build-lambdas:
    name: Build Lambda Functions
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Build chunk-processor Lambda
        working-directory: ./cmd/lambda/chunk-processor
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o bootstrap main.go
          zip chunk-processor.zip bootstrap
          mv chunk-processor.zip ../../../

      - name: Build update-video-chunk-status Lambda
        working-directory: ./cmd/lambda/update-video-chunk-status
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o bootstrap main.go
          zip update-video-chunk-status.zip bootstrap
          mv update-video-chunk-status.zip ../../../

      - name: Build zip-processor Lambda
        working-directory: ./cmd/lambda/zip-processor
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o bootstrap main.go
          zip zip-processor.zip bootstrap
          mv zip-processor.zip ../../../

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v5.1.0
        with:
          role-to-assume:  ${{ vars.AWS_ROLE_ARN }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload Lambda ZIPs to S3
        run: |
          aws s3 cp chunk-processor.zip s3://${{ env.S3_ASSETS_BUCKET }}/chunk-processor.zip
          aws s3 cp update-video-chunk-status.zip s3://${{ env.S3_ASSETS_BUCKET }}/update-video-chunk-status.zip
          aws s3 cp zip-processor.zip s3://${{ env.S3_ASSETS_BUCKET }}/zip-processor.zip

  terraform-apply:
    needs: [build-lambdas]
    name: Deploy - Terraform Apply
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      GIT_SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup SSH agent for git
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ env.GIT_SSH_KEY }}

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v5.1.0
        with:
          role-to-assume:  ${{ env.AWS_ROLE_ARN }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: infra
        run: |
          terraform init 

      - name: Terraform Apply
        working-directory: infra
        run: |
          terraform plan -var-file=values.tfvars
          terraform apply -var-file=values.tfvars -auto-approve

      - name: Done
        run: echo "Terraform apply finished."
