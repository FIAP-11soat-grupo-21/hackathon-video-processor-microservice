sonar.projectKey=FIAP-11soat-grupo-21_hackathon-video-processor-microservice
sonar.organization=fiap-11soat-grupo-21
sonar.projectVersion=1.0

sonar.sources=.
sonar.exclusions=**/*_test.go,**/vendor/**,**/testdata/**
